name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Test with pytest
      run: |
        export PATH=/home/runner/.local/bin:$PATH
        pip install --user pipenv
        pipenv install --dev --python $(which python)
        pipenv run pytest
